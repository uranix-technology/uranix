<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masuk | LinuxEdu</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fira+Code:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        .auth-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            position: relative;
        }

        .back-link {
            position: absolute;
            top: 30px;
            left: 30px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-muted);
            font-weight: 500;
            font-size: 0.95rem;
            z-index: 20;
            transition: color 0.3s ease;
        }

        .back-link:hover {
            color: var(--text-main);
        }

        .auth-card {
            background-color: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            position: relative;
            z-index: 10;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: formFadeIn 0.6s ease-out forwards;
        }

        @keyframes formFadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .auth-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .auth-header h2 {
            font-size: 2rem;
            margin-bottom: 8px;
            color: var(--text-main);
        }

        .auth-header p {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 0.9rem;
            font-weight: 500;
            margin-bottom: 8px;
            color: var(--text-main);
        }

        .form-control {
            width: 100%;
            padding: 12px 16px;
            background-color: #0b0f19;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-main);
            font-family: var(--font-sans);
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            font-size: 1rem;
            margin-top: 10px;
        }

        .auth-footer {
            margin-top: 30px;
            text-align: center;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .auth-footer a {
            color: var(--accent);
            font-weight: 600;
        }

        .auth-footer a:hover {
            color: var(--accent-hover);
        }

        @media (max-width: 480px) {
            .auth-card { padding: 30px 20px; }
            .back-link { top: 20px; left: 20px; }
        }
    </style>
</head>
<body>

    <a href="../index.html" class="back-link">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="19" y1="12" x2="5" y2="12"></line>
            <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
        Kembali ke Beranda
    </a>

    <div class="auth-wrapper relative-overflow">
        <div class="glow-bg top-left"></div>
        <div class="glow-bg bottom-right"></div>

        <div class="auth-card">
            <div class="auth-header">
                <h2>Selamat Datang</h2>
                <p>Masuk ke dasbor <span class="text-accent font-semibold">LinuxEdu</span> Anda.</p>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Alamat Surel</label>
                    <input type="email" id="email" class="form-control" placeholder="nama@email.com" required>
                </div>
                
                <div class="form-group">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                        <label for="password" style="margin-bottom: 0;">Kata Sandi</label>
                        <a href="#" style="font-size: 0.85rem; color: var(--accent);">Lupa sandi?</a>
                    </div>
                    <input type="password" id="password" class="form-control" placeholder="Masukkan kata sandi" required>
                </div>
                
                <button type="submit" class="btn btn-primary btn-submit">Masuk ke Sistem</button>
            </form>

            <div class="auth-footer">
                Belum memiliki akses? <a href="register.html">Daftar sekarang</a>
            </div>
        </div>
    </div>

    <script src="../assets/js/sheets-api.js"></script>
</body>
</html>
